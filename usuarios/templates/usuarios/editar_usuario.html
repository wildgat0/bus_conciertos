{% extends 'base.html' %}
{% block title %}Editar Usuario{% endblock %}
{% block content %}
<div class="page-header">
  <div class="container">
    <div class="breadcrumb"><a href="{% url 'gestion_usuarios' %}">Usuarios</a><span>›</span> Editar</div>
    <h1><i class="fa fa-user-edit"></i> Editar Usuario: {{ usuario.username }}</h1>
  </div>
</div>
<section class="seccion" style="max-width:600px;">
  <div class="form-card" style="max-width:none;">
    <form method="POST">
      {% csrf_token %}
      <div class="form-grid">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" name="first_name" class="form-control" value="{{ usuario.first_name }}">
        </div>
        <div class="form-group">
          <label>Apellido</label>
          <input type="text" name="last_name" class="form-control" value="{{ usuario.last_name }}">
        </div>
        <div class="form-group" style="grid-column:1/-1;">
          <label>Email</label>
          <input type="email" name="email" class="form-control" value="{{ usuario.email }}">
        </div>
        <div class="form-group" style="grid-column:1/-1;">
          <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;">
            <input type="checkbox" name="is_active" class="form-check-input" {% if usuario.is_active %}checked{% endif %}> Usuario activo
          </label>
        </div>
      </div>
      <div style="display:flex;gap:1rem;margin-top:1rem;">
        <a href="{% url 'gestion_usuarios' %}" class="btn btn-dark">Cancelar</a>
        <button type="submit" class="btn btn-primary"><i class="fa fa-save"></i> Guardar</button>
      </div>
    </form>
  </div>
</section>
{% endblock %}
