services:
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - sqlite_data:/app/data
      - static_data:/app/staticfiles
      - media_data:/app/media
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"          # Cambia 8080 por el puerto que quieras exponer en el VPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      - web

volumes:
  sqlite_data:
  static_data:
  media_data:
